<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" font-family="'IBM Plex Sans', Arial, sans-serif">
  <text x="410" y="28" text-anchor="middle" fill="#1C2B3A" font-size="14" font-weight="600">How a DevOps engineer differs from nearby roles</text>

  <!-- DevOps (highlighted) -->
  <rect x="15" y="48" width="185" height="220" rx="12" fill="#E3EDEA" stroke="#3C6E63" stroke-width="2"/>
  <text x="107" y="80" text-anchor="middle" fill="#1C2B3A" font-size="14.5" font-weight="700">DevOps Engineer</text>
  <text x="30" y="120" fill="#3C6E63" font-size="11.5" font-weight="700">FOCUS</text>
  <text x="30" y="140" fill="#3E5C76" font-size="12.5">The whole delivery</text>
  <text x="30" y="157" fill="#3E5C76" font-size="12.5">pipeline.</text>
  <text x="30" y="192" fill="#3C6E63" font-size="11.5" font-weight="700">SHIPS</text>
  <text x="30" y="212" fill="#3E5C76" font-size="12.5">CI/CD, cloud infra,</text>
  <text x="30" y="229" fill="#3E5C76" font-size="12.5">automation.</text>

  <!-- SRE -->
  <rect x="210" y="48" width="185" height="220" rx="12" fill="#EEF2F5" stroke="#3E5C76" stroke-width="1.5"/>
  <text x="302" y="80" text-anchor="middle" fill="#1C2B3A" font-size="14.5" font-weight="700">SRE</text>
  <text x="225" y="120" fill="#8896A3" font-size="11.5" font-weight="700">FOCUS</text>
  <text x="225" y="140" fill="#3E5C76" font-size="12.5">Reliability and</text>
  <text x="225" y="157" fill="#3E5C76" font-size="12.5">uptime.</text>
  <text x="225" y="192" fill="#8896A3" font-size="11.5" font-weight="700">SHIPS</text>
  <text x="225" y="212" fill="#3E5C76" font-size="12.5">SLOs, on-call,</text>
  <text x="225" y="229" fill="#3E5C76" font-size="12.5">incident response.</text>

  <!-- Platform -->
  <rect x="405" y="48" width="185" height="220" rx="12" fill="#EEF2F5" stroke="#3E5C76" stroke-width="1.5"/>
  <text x="497" y="80" text-anchor="middle" fill="#1C2B3A" font-size="14.5" font-weight="700">Platform Engineer</text>
  <text x="420" y="120" fill="#8896A3" font-size="11.5" font-weight="700">FOCUS</text>
  <text x="420" y="140" fill="#3E5C76" font-size="12.5">An internal developer</text>
  <text x="420" y="157" fill="#3E5C76" font-size="12.5">platform.</text>
  <text x="420" y="192" fill="#8896A3" font-size="11.5" font-weight="700">SHIPS</text>
  <text x="420" y="212" fill="#3E5C76" font-size="12.5">Self-service tools,</text>
  <text x="420" y="229" fill="#3E5C76" font-size="12.5">golden paths.</text>

  <!-- Software -->
  <rect x="600" y="48" width="185" height="220" rx="12" fill="#EEF2F5" stroke="#3E5C76" stroke-width="1.5"/>
  <text x="692" y="80" text-anchor="middle" fill="#1C2B3A" font-size="14.5" font-weight="700">Software Engineer</text>
  <text x="615" y="120" fill="#8896A3" font-size="11.5" font-weight="700">FOCUS</text>
  <text x="615" y="140" fill="#3E5C76" font-size="12.5">The product</text>
  <text x="615" y="157" fill="#3E5C76" font-size="12.5">itself.</text>
  <text x="615" y="192" fill="#8896A3" font-size="11.5" font-weight="700">SHIPS</text>
  <text x="615" y="212" fill="#3E5C76" font-size="12.5">Application features</text>
  <text x="615" y="229" fill="#3E5C76" font-size="12.5">and code.</text>
</svg>
