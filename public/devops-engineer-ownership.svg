<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 385" font-family="'IBM Plex Sans', Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#3E5C76"/></marker>
    <marker id="at" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#3C6E63"/></marker>
  </defs>

  <!-- left: developer -->
  <rect x="30" y="155" width="150" height="70" rx="12" fill="#EEF2F5" stroke="#3E5C76" stroke-width="1.5"/>
  <text x="105" y="185" text-anchor="middle" fill="#1C2B3A" font-size="14" font-weight="600">Developer</text>
  <text x="105" y="205" text-anchor="middle" fill="#3E5C76" font-size="12">writes the code</text>

  <!-- right: production -->
  <rect x="640" y="155" width="150" height="70" rx="12" fill="#EEF2F5" stroke="#3E5C76" stroke-width="1.5"/>
  <text x="715" y="185" text-anchor="middle" fill="#1C2B3A" font-size="14" font-weight="600">Production</text>
  <text x="715" y="205" text-anchor="middle" fill="#3E5C76" font-size="12">real users</text>

  <!-- middle container -->
  <rect x="215" y="55" width="390" height="250" rx="14" fill="#F7F9FA" stroke="#3C6E63" stroke-width="1.8"/>
  <text x="410" y="84" text-anchor="middle" fill="#3C6E63" font-size="13.5" font-weight="600">What a DevOps engineer owns</text>

  <!-- chips -->
  <g font-size="12.5" font-weight="600">
    <rect x="226" y="105" width="118" height="50" rx="9" fill="#E3EDEA" stroke="#3C6E63" stroke-width="1.2"/>
    <text x="285" y="135" text-anchor="middle" fill="#1C2B3A">CI/CD pipelines</text>
    <rect x="351" y="105" width="118" height="50" rx="9" fill="#E3EDEA" stroke="#3C6E63" stroke-width="1.2"/>
    <text x="410" y="135" text-anchor="middle" fill="#1C2B3A">Cloud + IaC</text>
    <rect x="476" y="105" width="118" height="50" rx="9" fill="#E3EDEA" stroke="#3C6E63" stroke-width="1.2"/>
    <text x="535" y="135" text-anchor="middle" fill="#1C2B3A">Automation</text>
    <rect x="226" y="205" width="118" height="50" rx="9" fill="#E3EDEA" stroke="#3C6E63" stroke-width="1.2"/>
    <text x="285" y="235" text-anchor="middle" fill="#1C2B3A">Monitoring</text>
    <rect x="351" y="205" width="118" height="50" rx="9" fill="#E3EDEA" stroke="#3C6E63" stroke-width="1.2"/>
    <text x="410" y="235" text-anchor="middle" fill="#1C2B3A">Security</text>
    <rect x="476" y="205" width="118" height="50" rx="9" fill="#E3EDEA" stroke="#3C6E63" stroke-width="1.2"/>
    <text x="535" y="235" text-anchor="middle" fill="#1C2B3A">Cost / FinOps</text>
  </g>

  <!-- flow arrows -->
  <line x1="182" y1="190" x2="211" y2="190" stroke="#3E5C76" stroke-width="1.8" marker-end="url(#a)"/>
  <line x1="607" y1="190" x2="636" y2="190" stroke="#3E5C76" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- feedback loop -->
  <path d="M715,227 L715,352 Q715,362 705,362 L115,362 Q105,362 105,352 L105,229" fill="none" stroke="#3C6E63" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#at)"/>
  <text x="410" y="380" text-anchor="middle" fill="#3C6E63" font-size="11.5">monitoring &amp; feedback loop</text>
</svg>
